apiVersion: apps/v1
kind: Deployment
metadata:
  name: office-llm-harness
  labels:
    app: office-llm-harness
spec:
  replicas: 2
  selector:
    matchLabels:
      app: office-llm-harness
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: office-llm-harness
    spec:
      containers:
        - name: mcp-server
          image: ghcr.io/YOUR_ORG/office-llm-harness:latest
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: HOST
              valueFrom:
                configMapKeyRef:
                  name: office-llm-harness-config
                  key: MCP_HOST
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: office-llm-harness-config
                  key: MCP_PORT
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 6
            periodSeconds: 10
