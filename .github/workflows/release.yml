name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  # ============================================================
  # CREATE GITHUB RELEASE WITH .EXE ASSET
  # Downloads the exe artifact from CI instead of rebuilding.
  # ============================================================
  create-release:
    name: Create Release (.exe)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download .exe artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: office-mcp-server-win-x64
          path: ./publish
        continue-on-error: true

      # Fallback: build if artifact not found (e.g. tag pushed before CI finishes)
      - name: Setup .NET 8
        if: steps.download.outcome == 'failure'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Windows executable (win-x64)
        if: steps.download.outcome == 'failure'
        run: >
          dotnet publish src/mcp-server/OfficeMcpServer.csproj
          -c Release
          -r win-x64
          --self-contained true
          -o ./publish
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true

      - name: Create ZIP archive
        run: |
          cd ./publish
          zip -j ../office-mcp-server-win-x64.zip office-mcp-server.exe

      - name: Extract tag version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            ./office-mcp-server-win-x64.zip
          body: |
            ## Release ${{ steps.version.outputs.VERSION }}

            ### Assets
            - `office-mcp-server-win-x64.zip` — Windows (x64) self-contained executable

            ### Usage
            ```powershell
            # Windows
            .\office-mcp-server.exe

            # Custom port
            .\office-mcp-server.exe 8080
            ```

            ### Docker
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            ```

  # ============================================================
  # BUILD + PUSH DOCKER IMAGE (on tag push)
  # ============================================================
  docker-release:
    name: Docker Release
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-static
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
